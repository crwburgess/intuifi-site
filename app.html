<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Intuifi – Run your report</title>
  <meta name="description" content="Upload your customer feedback files and get back a structured executive report. No prompting required.">
  <meta name="robots" content="noindex">

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://intuifi.io/assets/intuifi-icon.png">
  <link rel="apple-touch-icon" href="https://intuifi.io/assets/intuifi-icon.png">
  <meta name="theme-color" content="#0f625c">

  <style>
    :root {
      --brand: #0f625c;
      --brand-light: #e6efee;
      --bg-muted: #a2c4c9;
      --text: #111111;
      --muted: #5a5f66;
      --border: #e7eaee;
      --card-radius: 18px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Roboto, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      color: var(--text);
      background: #fff;
      line-height: 1.5;
    }

    /* ── Header ── */
    .site-header {
      border-bottom: 1px solid var(--border);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-logo {
      display: block;
      height: 32px;
      width: auto;
    }

    .header-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--brand);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .header-back:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0,0,0,.06);
    }

    .header-back svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ── Page intro ── */
    .page-intro {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 20px 20px;
      text-align: center;
    }

    /* Change this section */
.agent-frame-outer iframe {
  display: block;
  width: 100%;
  height: 75vh;          /* Takes up 75% of the viewport height dynamically */
  min-height: 650px;     /* Ensures it never gets too squished on shorter laptop screens */
  border: none;
}
    .page-intro h1 {
      font-size: clamp(24px, 3.5vw, 32px);
      line-height: 1.15;
      margin: 0 0 10px;
      letter-spacing: -0.2px;
    }

    .page-intro p {
      font-size: 16px;
      color: var(--muted);
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── Agent frame ── */
    .agent-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 16px 20px 40px;
    }

    .agent-frame-outer {
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.07);
      background: #fafafa;
    }

    .agent-frame-outer iframe {
      display: block;
      width: 100%;
      height: 680px;
      border: none;
    }

    /* ── Help note ── */
    .help-note {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px 16px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .help-note a {
      color: var(--brand);
      font-weight: 500;
      text-decoration: none;
    }

    .help-note a:hover {
      text-decoration: underline;
    }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    .footer-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 20px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    .footer-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--brand);
      text-decoration: none;
      font-weight: 500;
      background: #fff;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0,0,0,.06);
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
  .agent-frame-outer iframe {
    height: 70vh;
    min-height: 500px;
  }

  .page-intro {
    padding: 24px 16px 16px;
  }

  .agent-wrap {
    padding: 12px 16px 32px;
  }
}
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="https://intuifi.io">
        <img class="header-logo" src="https://intuifi.io/assets/logo.png" alt="Intuifi">
      </a>
      <a href="https://intuifi.io" class="header-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to site
      </a>
    </div>
  </header>

  <div class="page-intro">
    <h1>Run your report</h1>
    <p>Upload your customer feedback files and Intuifi will generate a structured executive report. No prompting required.</p>
  </div>

  <div class="agent-wrap">
  <div class="agent-frame-outer">
    <iframe
      src="https://intuifi.msagent.ai/run"
      allow="autoplay;clipboard-write;picture-in-picture"
      allowfullscreen
      title="Intuifi report generator"
    ></iframe>
  </div>
</div>

  <p class="help-note">
    Questions about your data or how this works? <a href="mailto:support@crwburgess.com">Get in touch</a> or read the <a href="https://intuifi.io/#faq">FAQ</a>.
  </p>

  <footer class="site-footer">
    <div class="footer-inner">
      <div>Built by Chris Burgess</div>
      <div class="footer-links">
        <a class="icon-btn" href="https://linkedin.com/in/crwburgess" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM0 8.25h5V23H0V8.25zM8 8.25h4.8v2.01h.07c.67-1.27 2.3-2.61 4.74-2.61 5.07 0 6 3.34 6 7.68V23h-5v-6.49c0-1.55-.03-3.55-2.17-3.55-2.17 0-2.5 1.69-2.5 3.44V23H8V8.25z"/>
          </svg>
          LinkedIn
        </a>
        <a class="icon-btn" href="https://crwburgess.com" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="9"/>
            <path d="M3 12h18M12 3a15.3 15.3 0 010 18M12 3a15.3 15.3 0 000 18"/>
          </svg>
          crwburgess.com
        </a>
        <a class="icon-btn" href="https://intuifi.io" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          intuifi.io
        </a>
      </div>
    </div>
  </footer>


  <script data-goatcounter="https://intuifi.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
  <noscript><img src="https://intuifi.goatcounter.com/count?p=/app" alt="" referrerpolicy="no-referrer-when-downgrade"></noscript>

</body>
</html>
